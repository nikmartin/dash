<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item>
      <ion-label>
        <h2>Use Imperial Units</h2>
        <p>MPH, Fahrenheit</p>
      </ion-label>
      <ion-toggle [checked]="useImperial$ | async" (ionChange)="toggleImperial($event)"></ion-toggle>
    </ion-item>
  </ion-list>
</ion-content>
