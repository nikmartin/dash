name: Build and Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main # Change this to master if your default branch is master

permissions:
  contents: write # Grants permission to push to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Match your local Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular Application
        run: npm run build -- --configuration=production

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/YOUR_PROJECT_NAME/browser # Change this to your exact build output folder path
          branch: gh-pages # The branch the action will deploy to
